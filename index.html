<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unka Gabaasa Damee Teknikaa</title>
    <style>
        body {
            background-color: rgba(0, 29, 5, 0.1);
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .div{backgroun-color:brown;height:20px;}
    </style>
</head>
<body>
    <div class="nav">
 <a href="https://etachali2-prog.github.io/To-home/">Gara Fuula Jalqabaatti</a> 
        <label>Afaan filadhaa:</label>
<select onchange="location = this.value;">
  <option value="" disabled selected>Select Language</option>
  <option value="https://etachali2-prog.github.io/oreport/">Afaan Oromoo</option>
  <option value="https://etachali2-prog.github.io/report/">English</option>
  <option value="https://etachali2-prog.github.io/Areport/">Amharic</option>
</select>
       </div> 
 <marquee> <h1 style="color:Green;">Kutaa: Unka Gabaasa Damee Teknikaa!</h1> </marquee> 
   
  <form id="myForm">
     
    <label>Guyyaa:</label><input type="date" name="Date" required>
    <label>Kutaa/Damee:</label><input type="text" name="Department"><br><br>
    
    <label>Kan Gaafate:</label><input type="text" name="RequestedBy">
    <label>Sa'aatii Gaaffii:</label><input type="time" name="RequestedTime"><br><br>
    
    <label>Maqaa Maashinii:</label><input type="text" name="MachineName">
    <label>Iddoo/Bakka:</label><input type="text" name="Location"><br><br>
    
    <label>Gosa Suphaa Barbaachisu:</label>
    <select name="MaintenanceType">
      <option value="Preventive Maintenance">Suphaa Ittisa Argamaa</option>
      <option value="Corrective Maintenance">Suphaa Sirreessaa</option>
      <option value="Emergency Breakdown">Suphaa Hatattamaa</option>
      <option value="Inspection">Sakatta'iinsa</option>
      <option value="Installation">Dhaabu/Mijaawaa</option>
      <option value="Modification">Fooyyessiinsaa</option>
    </select><br><br>
    
    <label>Ibsa Rakkoo/Miidhaa:</label><br>
    <textarea name="ProblemDescription"></textarea><br><br>
    
    <label>Sadarkaa Hatattamaa:</label>
    <select name="PriorityLevel">
      <option value="Low">Gadi Aanaa</option>
      <option value="Medium">Giddu Galeessa</option>
      <option value="High">Olaanaa</option>
      <option value="Urgent">Ariifachiisaa</option>
    </select><br><br>
    
    <label>Hojii Suphaa Gaafatame:</label>
    <select name="MaintenanceActivity">
      <option value="Electrical troubleshooting">Barbaacha Rakkoo Elektriikaa</option>
      <option value="Mechanical repair">Suphaa Mekaaniikaa</option>
      <option value="Workshop">Hojii Warkishooppii</option>
    </select><br><br>
    
    <hr>
    <h3>Tarkaanfii Kutaa Suphaa:</h3>
    <label>Maqaa Tekniishana Ramadame:</label><input type="text" name="AssignedTechnician">
    <label>Guyyaa:</label><input type="date" name="Date">
    <label>Sa'aatii:</label><input type="time" name="Time"><br><br>
    <label>Tarkaanfii Filatame:</label><br>
    <textarea name="ActionTaken"></textarea><br><br>

    <hr>
    <h3>Odeeffannoo Xumuraa:</h3>
    <label>Sa'aatii Hojiin Jalqabame:</label><input type="time" name="WorkStartTime">
    <label>Sa'aatii Hojiin Xumurame:</label><input type="time" name="WorkCompletionTime">
    <label>Yeroo Maashiniin Dhaabbate:</label><input type="text" name="DowntimeDuration"><br><br>

    <hr>
    <h3>Ulaagaa Mi'a Jidduu (Spare Part):</h3>
    <label>Maqaa Mi'aa:</label><input type="text" name="SpareItemName">
    <label>Lakk Paartii/Ibsa:</label><input type="text" name="SparePartNo">
    <label>Safartuu (Unit):</label><input type="text" name="SpareUnit">
    <label>Baay'ina:</label><input type="number" name="SpareQuantity">
    <br><br>
    <label>Yaada/Hubachiisa:</label><br>
    <textarea name="SpareRemark"></textarea><br><br>

    <hr>
    <label>Haala Suphaa:</label>
    <select name="MaintenanceStatus">
      <option value="In progress">Adeemsarra Jira</option>
      <option value="Completed">Xumurameera</option>
      <option value="Pending">Eeggamsarra Jira</option>
    </select><br><br>
    
    <label>Yoo eeggamsarra jiraate, maaliif?</label><br>
    <textarea name="PendingReason"></textarea><br><br>
    
    <hr>
    <h3>Mirkaneessa:</h3>
    <label>Maqaa Suparvaayizeraa/Goggoo Garee:</label>
    <input type="text" name="SupervisorName"><br><br>
    <label>Maqaa Dura Taa'aa Garee Teknikaa:</label>
    <input type="text" name="TechnicTeamLeaderName"><br><br>

    <button type="submit">Ergi</button>
  </form>
  
<script>
  const form = document.getElementById('myForm');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzUsSM2UG_hlM1uGYfMXBeI3usddMsyyzyZMoRe4DbU0W5QhCDKTED7Pb1TbXTJy1gVLA/exec'; 

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.textContent = "Ergamaa jira...";
    submitBtn.disabled = true;
    
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
         alert("Galatoomaa! Gabaasni keessan sirriitti ergameera.");
         form.reset(); 
         submitBtn.textContent = "Ergi";
         submitBtn.disabled = false;
      })
      .catch(error => {
         console.error('Error!', error.message);
         alert("Dogoggorri uumameera. Maaloo irra deebi'ii yaali.");
         submitBtn.textContent = "Ergi";
         submitBtn.disabled = false;
      });
  });
</script>
</body>
</html>
